<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>C++ Quest Academy</title>
  </head>
  <body>
    <!--
      React mounts into this div.
      main.jsx calls createRoot(document.getElementById('root')).render(<App />)
      which fills this div with the entire game UI.
    -->
    <div id="root"></div>

    <!--
      Vite replaces this script tag with the compiled React bundle at build time.
      During dev (npm run dev) it handles this automatically via HMR.
    -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
